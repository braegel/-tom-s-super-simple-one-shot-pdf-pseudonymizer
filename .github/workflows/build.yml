name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
      - "claude/**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --clean --name PDFAnonymizer --windowed --onefile --add-data "src;src" src/main.py

      - name: Verify build output
        run: |
          dir dist\
          dir dist\PDFAnonymizer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDFAnonymizer-Windows
          path: dist/PDFAnonymizer.exe

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "PDF Anonymizer – Download"
          body: |
            ## PDF Anonymizer

            **`PDFAnonymizer.exe` unten unter „Assets" herunterladen und starten.**

            Dieser Release wird bei jedem Push automatisch aktualisiert.

            ---

            ### Voraussetzungen
            - Windows 10/11
            - Ein API-Key für OpenAI, Anthropic (Claude) oder Google Gemini
            - PDFs müssen Texterkennung (OCR) enthalten

            ### Erste Schritte
            1. `PDFAnonymizer.exe` starten
            2. ⚙ Einstellungen öffnen → API-Key hinterlegen
            3. PDF per Drag & Drop ablegen → Speicherort wählen → fertig!

            ### Was wird anonymisiert?
            Vornamen, Nachnamen, Adressen (Straße, Hausnummer, PLZ, Stadt), Kontonummern/IBAN, E-Mail-Adressen, Telefonnummern, Krypto-Adressen, Unternehmensnamen (GmbH, AG, Ltd, …), Grundstücksangaben, Geburtsdaten, Steuer- und Sozialversicherungsnummern, Ausweisnummern – in allen Sprachen.

            Gleiche Entitäten erhalten immer dieselbe Variable (VBX01, VBX02, …).
            Anonymisierte Stellen werden türkis überdeckt. Am Ende wird ein Variablen-Verzeichnis angehängt.
          files: dist/PDFAnonymizer.exe
          draft: false
          prerelease: false
          make_latest: true
